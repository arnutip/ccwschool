<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบงานโรงเรียน</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="phone-frame">
    <section class="phone-screen">
      <div class="speaker" aria-hidden="true"></div>

      <header class="hero">
        <h1>ระบบงานโรงเรียน</h1>
        <p>เลือกเมนูที่ต้องการใช้งาน</p>
      </header>

      <section class="menu-list" aria-label="เมนูระบบ">
        <!-- วิธีเปลี่ยนชื่อปุ่ม: แก้ข้อความใน <span class="name">...</span> -->
        <!-- วิธีเปลี่ยนลิงก์: แก้ค่า href="..." ของปุ่มนั้น -->
        <!-- วิธีเพิ่มปุ่มใหม่: คัดลอกบล็อก <a class="menu-item">...</a> หรือ <button class="menu-item">...</button> แล้ววางต่อท้าย -->

        <a class="menu-item" href="https://script.google.com/macros/s/AKfycbw5sFscsaWgGi3pEUZUvRJ_8NoLsGuJiMg2w9XiAapD2-BT2gLYEcBOZgDs3vKLHLq1vA/exec" target="_blank" rel="noopener noreferrer">
          <span class="name">1. ระบบบริหารงบประมาณ</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="menu-item" href="https://script.google.com/macros/s/AKfycbwdH2vvHk5LAVu_J7h2j6Rh8CjU-ePv77RrSQ0HCtg1TEX3BVAjJaKuDGzf6NDpp0BMdQ/exec" target="_blank" rel="noopener noreferrer">
          <span class="name">2. ระบบลาออนไลน์</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="menu-item" href="https://script.google.com/macros/s/AKfycbwFN-7t2xxYWA_j0cXna7iZuf1pOK5HKRhsnuEP4oXsoM26QlhcW_9NOmwvjcjIKH7ltw/exec" target="_blank" rel="noopener noreferrer">
          <span class="name">3. ระบบส่ง PA</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <button class="menu-item" type="button" data-dev-message="ระบบเช็คชื่อ - น้ำหนักส่วนสูงออนไลน์ อยู่ระหว่างพัฒนา">
          <span class="name">4. ระบบเช็คชื่อ - น้ำหนักส่วนสูงออนไลน์</span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>

        <button class="menu-item" type="button" data-dev-message="ระบบฝากเงินออนไลน์ อยู่ระหว่างพัฒนา">
          <span class="name">5. ระบบฝากเงินออนไลน์</span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>

        <a class="menu-item" href="https://docs.google.com/spreadsheets/d/1L4QiuM0tduY5IQBmRKKoXq2ljHYqVqeDvoCuiGGBIoo/edit?gid=1872321998#gid=1872321998" target="_blank" rel="noopener noreferrer">
          <span class="name">6. โปรแกรม ปพ.โรงเรียน</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="menu-item" href="https://smart.chaiyaphum3.go.th/" target="_blank" rel="noopener noreferrer">
          <span class="name">7. Smart Area</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>

        <a class="menu-item" href="https://www.gprocurement.go.th/homepage.html" target="_blank" rel="noopener noreferrer">
          <span class="name">8. ระบบ EGP</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>
      </section>

      <p class="hint">แก้ข้อความและลิงก์ได้ง่ายในไฟล์ index.html</p>
    </section>
  </main>

  <script>
    document.querySelectorAll("button.menu-item[data-dev-message]").forEach((button) => {
      button.addEventListener("click", () => {
        alert(button.dataset.devMessage || "อยู่ระหว่างพัฒนา");
      });
    });
  </script>
</body>
</html>
